name: Validate Manifests

on:
  pull_request:
    branches: [main, master]
    paths:
    - 'k8s/**'
    - '.github/workflows/**'

jobs:
  kustomize-build:
    name: Kustomize Build (${{ matrix.overlay }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        overlay: [dev, prod]
    steps:
    - uses: actions/checkout@v4

    - name: Install kustomize
      uses: imranismail/setup-kustomize@v2

    - name: Build ${{ matrix.overlay }} overlay
      run: kustomize build k8s/overlays/${{ matrix.overlay }} > /tmp/manifests-${{ matrix.overlay }}.yaml

    - name: Upload built manifests
      uses: actions/upload-artifact@v4
      with:
        name: manifests-${{ matrix.overlay }}
        path: /tmp/manifests-${{ matrix.overlay }}.yaml

  kubeconform:
    name: Schema Validation (${{ matrix.overlay }})
    runs-on: ubuntu-latest
    needs: kustomize-build
    strategy:
      matrix:
        overlay: [dev, prod]
    steps:
    - name: Download manifests
      uses: actions/download-artifact@v4
      with:
        name: manifests-${{ matrix.overlay }}
        path: /tmp

    - name: Install kubeconform
      run: |
        curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
          | tar xz
        sudo mv kubeconform /usr/local/bin/

    - name: Validate ${{ matrix.overlay }} manifests
      run: |
        kubeconform \
          -strict \
          -ignore-missing-schemas \
          -kubernetes-version 1.32.0 \
          /tmp/manifests-${{ matrix.overlay }}.yaml

  trivy-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: public.ecr.aws/l6m2t8p7/docker-2048:latest
        format: table
        exit-code: '1'
        ignore-unfixed: true
        severity: CRITICAL,HIGH

  checkov:
    name: Security Policy Check
    runs-on: ubuntu-latest
    needs: kustomize-build
    strategy:
      matrix:
        overlay: [dev, prod]
    steps:
    - name: Download manifests
      uses: actions/download-artifact@v4
      with:
        name: manifests-${{ matrix.overlay }}
        path: /tmp

    - name: Run Checkov on ${{ matrix.overlay }} manifests
      uses: bridgecrewio/checkov-action@master
      with:
        file: /tmp/manifests-${{ matrix.overlay }}.yaml
        framework: kubernetes
        output_format: cli
        soft_fail: false
