apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: demo-cluster
  region: us-east-1
  version: "1.32"

# Enable OIDC provider for IAM Roles for Service Accounts (IRSA)
iam:
  withOIDC: true

vpc:
  # Single NAT Gateway reduces costs significantly for learning/dev environments.
  # Default (HighlyAvailable) creates one NAT Gateway per AZ (2 total in us-east-1a/b),
  # doubling the hourly base cost from ~$0.045/hr to ~$0.09/hr.
  # For production, use HighlyAvailable to avoid cross-AZ traffic in a failure scenario.
  nat:
    gateway: Single

availabilityZones: ["us-east-1a", "us-east-1b"]

fargateProfiles:
  # kube-system and default are required for the AWS Load Balancer Controller
  # and core cluster components to run on Fargate
  - name: fp-default
    selectors:
      - namespace: default
      - namespace: kube-system

  # Dedicated profile for the 2048 game workload.
  # Pods ONLY schedule to Fargate if their namespace matches a profile selector.
  # This is why deploying to the wrong namespace causes Pending state.
  - name: alb-sample-app
    selectors:
      - namespace: game-2048
