apiVersion: v1
kind: Service
metadata:
  namespace: game-2048
  name: service-2048
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  # NodePort is required when using ALB target-type: ip with Fargate.
  # The ALB routes directly to pod IPs, bypassing kube-proxy.
  type: NodePort
  # Selector MUST match the labels in deployment.yaml exactly.
  # A mismatch here causes 503 errors from the ALB (no endpoints).
  selector:
    app.kubernetes.io/name: app-2048
