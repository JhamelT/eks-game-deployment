apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
# Reduce replica count for dev — no need to spread across 3 pods
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: deployment-2048

# Relax HPA bounds for dev to reduce cost
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 4
  target:
    kind: HorizontalPodAutoscaler
    name: hpa-2048

# PDB: only require 1 pod available in dev
- patch: |-
    - op: replace
      path: /spec/minAvailable
      value: 1
  target:
    kind: PodDisruptionBudget
    name: pdb-2048
