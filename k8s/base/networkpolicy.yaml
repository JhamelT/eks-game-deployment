apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netpol-2048
  namespace: game-2048
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: app-2048
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow inbound HTTP from the ALB (IP target mode — traffic arrives directly from the VPC)
  - ports:
    - port: 80
      protocol: TCP
  egress:
  # Allow DNS only — this app makes no outbound calls
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
